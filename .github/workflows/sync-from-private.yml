name: Sync data from private repo

# Runs in the PRIVATE repo — copy this to .github/workflows/sync-public-data.yml
# in the private monorepo to push resources.json / funding.json to the public repo.
#
# Setup:
#   1. Create a PAT with 'repo' scope for the public repo
#   2. Add it as secret PUBLIC_REPO_PAT in the PRIVATE repo
#   3. Set PUBLIC_REPO below to your actual public repo slug

on:
  push:
    branches: [main]
    paths:
      - 'data/seeds/resources.json'
      - 'data/seeds/funding.json'

jobs:
  sync:
    name: Export JSON → Markdown and sync to public repo
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO: makerhub-india/data   # ← update if org/repo name changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone public repo
        env:
          PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git clone "https://x-access-token:${PAT}@github.com/${PUBLIC_REPO}.git" /tmp/public-repo

      - name: Export JSON → Markdown files
        run: |
          # Point export script at the cloned public repo
          python3 scripts/export_to_md.py

          # Copy generated MD files to public repo
          cp -r public-repo/resources/. /tmp/public-repo/resources/
          cp -r public-repo/funding/.   /tmp/public-repo/funding/

      - name: Commit and push
        env:
          PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          cd /tmp/public-repo
          git config user.name  "MakerHub Bot"
          git config user.email "bot@makerhub.in"
          git add resources/ funding/
          if git diff --staged --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          COUNTS=$(python3 -c "
          import re
          from pathlib import Path
          total = sum(
              len(re.findall(r'^### ', f.read_text(), re.MULTILINE))
              for f in Path('resources').glob('*.md')
              if f.name != 'README.md'
          )
          print(total)
          ")
          git commit -m "sync: export dataset (${COUNTS} resources)"
          git push
