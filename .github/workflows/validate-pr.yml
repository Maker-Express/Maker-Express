name: Validate PR

on:
  pull_request:
    paths:
      - "resources/**"
      - "funding/**"
      - "skills/**"

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'skill') || contains(join(github.event.pull_request.changed_files, ','), 'skills/')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Security + quality scan
        run: |
          python3 scripts/check_skills.py skills/
          EXIT=$?
          if [ $EXIT -eq 2 ]; then
            echo "❌ SECURITY issues found — cannot merge until resolved."
            exit 2
          elif [ $EXIT -eq 1 ]; then
            echo "⚠️ Quality warnings. Maintainer review required."
            exit 0  # don't block on quality warnings, but report them
          fi

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Markdown files
        run: python3 scripts/validate_md.py resources/ funding/

      - name: Check for duplicate slugs across all files
        run: |
          python3 - << 'EOF'
          import re, sys
          from pathlib import Path
          SLUG_CODE = re.compile(r"\|\s*\*\*Slug\*\*\s*\|\s*`([^`]+)`")
          slugs = {}
          dupes = []
          for f in sorted(Path("resources").glob("*.md")):
              if f.name == "README.md":
                  continue
              for m in SLUG_CODE.finditer(f.read_text()):
                  slug = m.group(1).strip()
                  if slug in slugs:
                      dupes.append(f"  '{slug}' in {f.name} (also in {slugs[slug]})")
                  else:
                      slugs[slug] = f.name
          if dupes:
              print("Duplicate slugs found across files:")
              print("\n".join(dupes))
              sys.exit(1)
          else:
              print(f"OK — {len(slugs)} unique slugs")
          EOF

      - name: Count changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          ADDED=$(git diff --diff-filter=A --name-only "origin/${BASE_REF}...HEAD" -- 'resources/*.md' 'funding/*.md' | wc -l | tr -d ' ')
          MODIFIED=$(git diff --diff-filter=M --name-only "origin/${BASE_REF}...HEAD" -- 'resources/*.md' 'funding/*.md' | wc -l | tr -d ' ')
          echo "Files added: ${ADDED}, modified: ${MODIFIED}"
